<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
   <link rel="icon" type="image/png" href="assets/canvas.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="sidebar" id="sidebar">
  <h2>PRTY</h2>
  <a href="index.html">Home</a>
  <a href="games.html">Games</a>
  <a href="apps.html">Apps</a>
  <a href="movies.html">Movies</a>
  <a href="manga.html">Manga</a>
  <a href="proxy.html">Proxy</a>
  <a href="credits.html">Credits</a>
  <a href="radio.html">PRTY Radio</a>
  <a class="discord-btn" href="https://discord.gg/MdNsPVTJGv" target="_blank">Discord</a>
  <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
</div>

<div class="main">

  <div style="display:flex; gap:10px; margin-bottom:10px;">
    <button onclick="goBack()">⬅ Back</button>
    <button onclick="fullscreen()">⛶ Fullscreen</button>
    <button onclick="openBlank()">🕶 about:blank</button>
  </div>

  <iframe
    id="game-frame"
    style="width:100%; height:80vh; border:none;"
    allowfullscreen
  ></iframe>

</div>

<script src="js/main.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const game = params.get("game");
const frame = document.getElementById("game-frame");

if (!game) {
  window.location.href = "games.html";
} else {
  frame.src = decodeURIComponent(game);
}

function goBack() {
  window.location.href = "games.html";
}

function fullscreen() {
  frame.requestFullscreen();
}

function openBlank() {
  const win = window.open("about:blank");
  if (!win) return;

  win.document.write(`
    <iframe src="${frame.src}"
      style="border:none;width:100vw;height:100vh;"></iframe>
  `);
}
</script>

</body>
</html>
