<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="icon" type="image/png" href="assets/canvas.png">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<style>
/* === PLAYER CONTROLS (FIXED) === */
.player-controls {
  position: fixed;
  top: 15px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 12px;
  z-index: 9999;

  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  padding: 10px 16px;
  border-radius: 999px;
  box-shadow: 0 0 25px rgba(0,255,255,0.35);
}

.player-controls button {
  background: linear-gradient(135deg, #00ffff, #ff00cc);
  border: none;
  color: #000;
  font-weight: bold;
  padding: 10px 18px;
  border-radius: 999px;
  cursor: pointer;
  font-size: 0.9rem;
}

.player-controls button:hover {
  transform: scale(1.08);
}
</style>

<div class="sidebar" id="sidebar">
  <h2>PRTY</h2>
  <a href="index.html">Home</a>
  <a href="games.html">Games</a>
  <a href="apps.html">Apps</a>
  <a href="movies.html">Movies</a>
  <a href="manga.html">Manga</a>
  <a href="proxy.html">Proxy</a>
  <a href="credits.html">Credits</a>
  <a href="radio.html">PRTY Radio</a>
  <a class="discord-btn" href="https://discord.gg/MdNsPVTJGv" target="_blank">Discord</a>
  <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
</div>

<div class="main">

  <!-- CONTROLS -->
  <div class="player-controls">
    <button onclick="goBack()">⬅ Back</button>
    <button onclick="fullscreenGame()">⛶ Fullscreen</button>
    <button onclick="openBlank()">🕶 about:blank</button>
  </div>

  <!-- GAME FRAME -->
  <iframe
    id="game-frame"
    style="width:100%; height:80vh; border:none;; margin-top:90px:"
    allowfullscreen
  ></iframe>

</div>

<script src="js/main.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const game = params.get("game");
const frame = document.getElementById("game-frame");

if (!game) {
  window.location.href = "games.html";
} else {
  frame.src = decodeURIComponent(game);
}

function goBack() {
  window.location.href = "games.html";
}

function fullscreenGame() {
  if (frame.requestFullscreen) {
    frame.requestFullscreen();
  }
}

function openBlank() {
  const win = window.open("about:blank");
  if (!win) return;

  win.document.write(`
    <iframe src="${frame.src}"
      style="border:none;width:100vw;height:100vh;"></iframe>
  `);
}
</script>

</body>
</html>
